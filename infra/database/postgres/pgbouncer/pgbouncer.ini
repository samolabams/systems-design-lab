;; PgBouncer config for the lab connection pool.
;; Sits between the app and postgres-primary so load balancing can demonstrate how a pool
;; multiplexes many app connections onto few server connections.

[databases]
;; Clients connect to "app" and PgBouncer forwards to the primary's app DB.
app = host=postgres-primary port=5432 dbname=app

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432

auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

;; transaction pooling: a server connection is held only for the duration of a
;; transaction, which is what makes pooling dramatic under load.
pool_mode = transaction
max_client_conn = 1000
default_pool_size = 20

admin_users = app
stats_users = app

ignore_startup_parameters = extra_float_digits
