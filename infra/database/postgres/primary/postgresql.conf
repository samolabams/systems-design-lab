# postgresql.conf overrides for the primary (mounted via command flags / conf.d).
# Tuned to be replication-ready so the replication and failover streaming replica can attach.

listen_addresses = '*'

# Store passwords as md5 so PgBouncer (md5 userlist) and the standby can auth.
password_encryption = md5

# Write-Ahead Log: 'replica' is the minimum level for streaming replication.
wal_level = replica
max_wal_senders = 10
max_replication_slots = 10
wal_keep_size = 128MB

# Make replication lag observable (replication and failover demo): hot_standby feedback off by default
# so you can watch lag grow under load.
hot_standby = on
