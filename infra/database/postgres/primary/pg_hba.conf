# pg_hba.conf for the primary.
# Allows the replicator role to open replication connections from the backend
# network (Docker's bridge subnet). The DB is on `backend` (internal: true),
# so this is not reachable from the host (DMZ).

# TYPE  DATABASE        USER         ADDRESS         METHOD
local   all             all                          trust
host    all             all          127.0.0.1/32    trust
host    all             all          ::1/128         trust
host    all             all          0.0.0.0/0       md5
host    replication     replicator   0.0.0.0/0       md5
