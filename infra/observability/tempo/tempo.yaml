# Grafana Tempo — distributed traces backend (5, third pillar).
#
# Single-binary Tempo: it receives spans over OTLP from the OTel Collector and
# stores them on a local volume (no object store needed for a lab). Grafana
# queries it over HTTP on :3200. Retention is short (1h) — this is a scratch
# lab, not a system of record.

server:
  http_listen_port: 3200

# Accept spans over OTLP (gRPC 4317 / HTTP 4318). The collector forwards here.
distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 1h # traces older than this are dropped (lab scratch space)

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/blocks
    wal:
      path: /var/tempo/wal

# Let Grafana build a service graph / span metrics from traces.
metrics_generator:
  registry:
    external_labels:
      source: tempo
  storage:
    path: /var/tempo/generator/wal
overrides:
  metrics_generator_processors: [] # keep off by default; traces alone are enough
