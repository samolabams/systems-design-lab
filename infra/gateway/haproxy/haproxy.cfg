# load balancing contrast gateway: HAProxy. Runs the SAME traffic as Nginx but adds
# ACTIVE health checks (it probes /health and ejects a dead backend on its own,
# instead of waiting for max_fails like Nginx). Also exposes a live stats page.
#
# Activate with: make load-balancing-haproxy

global
    log stdout format raw local0
    maxconn 4096

defaults
    log     global
    mode    http
    option  httplog
    timeout connect 2s
    timeout client  10s
    timeout server  10s
    # Active health check every 2s against /health.
    default-server inter 2s fall 3 rise 2

frontend http_in
    bind *:80
    default_backend app_backend

# Built-in runtime stats page: http://localhost:8404/stats
frontend stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 5s

backend app_backend
    balance roundrobin
    option httpchk GET /health
    # Docker DNS may return several app IPs; server-template fans them out.
    server-template app 3 app:3000 check resolvers docker

resolvers docker
    nameserver dns 127.0.0.11:53
    resolve_retries 3
    timeout resolve 1s
    timeout retry   1s
    hold valid 10s
