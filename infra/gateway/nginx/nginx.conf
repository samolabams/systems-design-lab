worker_processes auto;

events { worker_connections 1024; }

http {
  # Docker's embedded DNS. Resolving the `app` name *per request* (via a
  # variable in proxy_pass below) is what lets a single service name fan out
  # across every `--scale app=N` replica -- OSS Nginx resolves a static
  # `upstream { server app:3000; }` only once at boot and would pin to one IP.
  resolver 127.0.0.11 valid=5s ipv6=off;

  log_format observed '$remote_addr "$request" $status '
                      'upstream=$upstream_addr rt=$request_time';
  access_log /dev/stdout observed;

  server {
    listen 80;

    set $backend "app:3000";

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_connect_timeout 2s;
    proxy_read_timeout 10s;
    proxy_next_upstream error timeout http_502 http_503 http_504;

    # Health of the gateway itself.
    location = /gateway-health {
      return 200 'gateway ok\n';
      add_header Content-Type text/plain;
    }

    # API gateway route map. These public /api/* paths are owned by the
    # gateway and forwarded to the internal app routes.
    location = /api/health {
      proxy_pass http://$backend/health;
    }

    location = /api/metrics {
      proxy_pass http://$backend/metrics;
    }

    location = /api/shorten {
      proxy_pass http://$backend/shorten;
    }

    location = /api/jobs {
      proxy_pass http://$backend/jobs;
    }

    location ~ ^/api/links/(?<code>[^/]+)$ {
      proxy_pass http://$backend/$code;
    }

    location / {
      # Compatibility route for existing modules that still call the app's
      # original paths directly through the gateway.
      proxy_pass http://$backend;
    }
  }
}
