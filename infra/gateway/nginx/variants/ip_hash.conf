worker_processes auto;
events { worker_connections 1024; }
http {
  # load balancing variant: ip_hash. Same client IP always lands on the same backend
  # (sticky sessions). NOTE: OSS Nginx resolves this static upstream once at
  # boot, so under Docker --scale it pins to a single replica IP -- the very
  # re-resolution gap that service discovery (service discovery) closes. Use it to teach the
  # *directive* and the stickiness concept, not live rebalancing.
  upstream app_upstream {
    ip_hash;
    server app:3000 max_fails=3 fail_timeout=10s;
  }
  resolver 127.0.0.11 valid=10s ipv6=off;
  log_format observed '$remote_addr "$request" $status upstream=$upstream_addr rt=$request_time urt=$upstream_response_time';
  access_log /dev/stdout observed;
  server {
    listen 80;
    location = /gateway-health { return 200 'gateway ok\n'; add_header Content-Type text/plain; }
    location / {
      proxy_pass http://app_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_connect_timeout 2s;
      proxy_read_timeout 10s;
      proxy_next_upstream error timeout http_502 http_503 http_504;
    }
  }
}
