worker_processes auto;

events { worker_connections 1024; }

http {
  # Same per-request DNS resolver as the base config (see nginx.conf) so the
  # gateway still fans out across `--scale app=N` replicas.
  resolver 127.0.0.11 valid=5s ipv6=off;

  log_format observed '$remote_addr "$request" $status '
                      'upstream=$upstream_addr rt=$request_time';
  access_log /dev/stdout observed;

  # --- Rate limiting (rate limiting) --------------------------------------------------
  # A "leaky bucket": requests are admitted at a steady average RATE; a short
  # BURST is allowed to absorb spikes; anything over that is rejected. The zone
  # is an in-memory table keyed by client IP ($binary_remote_addr is compact).
  #   rate=5r/s  -> steady state ~5 requests/second per IP
  #   10m zone   -> ~160k unique IPs tracked
  limit_req_zone $binary_remote_addr zone=perip:10m rate=5r/s;

  # Return 429 Too Many Requests (the correct status) instead of Nginx's
  # historical default of 503.
  limit_req_status 429;

  server {
    listen 80;

    location = /gateway-health {
      return 200 'gateway ok\n';
      add_header Content-Type text/plain;
    }

    location / {
      # burst=5  -> up to 5 extra requests may queue beyond the steady rate
      # nodelay  -> serve the burst immediately (don't trickle), then reject
      #             everything above rate+burst with 429 right away.
      limit_req zone=perip burst=5 nodelay;

      set $backend "app:3000";
      proxy_pass http://$backend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_connect_timeout 2s;
      proxy_read_timeout 10s;
      proxy_next_upstream error timeout http_502 http_503 http_504;
    }
  }
}
