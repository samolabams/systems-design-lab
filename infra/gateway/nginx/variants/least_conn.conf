worker_processes auto;
events { worker_connections 1024; }
http {
  # load balancing variant: least_conn. Sends each request to the backend with the fewest
  # active connections. NOTE: OSS Nginx resolves this static upstream once at
  # boot, so under Docker --scale it sees one replica IP -- the re-resolution
  # gap service discovery (service discovery) closes. To see least_conn truly balance, list
  # replicas explicitly (server app1; server app2; ...) or use Nginx Plus
  # `resolve`. Here it teaches the directive + the 'route around the slow node'
  # idea.
  upstream app_upstream {
    least_conn;
    server app:3000 max_fails=3 fail_timeout=10s;
  }
  resolver 127.0.0.11 valid=10s ipv6=off;
  log_format observed '$remote_addr "$request" $status upstream=$upstream_addr rt=$request_time urt=$upstream_response_time';
  access_log /dev/stdout observed;
  server {
    listen 80;
    location = /gateway-health { return 200 'gateway ok\n'; add_header Content-Type text/plain; }
    location / {
      proxy_pass http://app_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_connect_timeout 2s;
      proxy_read_timeout 10s;
      proxy_next_upstream error timeout http_502 http_503 http_504;
    }
  }
}
