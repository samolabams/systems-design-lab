worker_processes auto;
events { worker_connections 1024; }
http {
  # load balancing variant: round-robin via Docker DNS. The variable in proxy_pass forces
  # per-request DNS resolution, so a single `app` name fans out across every
  # --scale replica. This is the working default (drop-in for nginx.conf).
  resolver 127.0.0.11 valid=5s ipv6=off;
  log_format observed '$remote_addr "$request" $status upstream=$upstream_addr rt=$request_time';
  access_log /dev/stdout observed;
  server {
    listen 80;
    location = /gateway-health { return 200 'gateway ok\n'; add_header Content-Type text/plain; }
    location / {
      set $backend "app:3000";
      proxy_pass http://$backend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_connect_timeout 2s;
      proxy_read_timeout 10s;
      proxy_next_upstream error timeout http_502 http_503 http_504;
    }
  }
}
