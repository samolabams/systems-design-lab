worker_processes auto;

events { worker_connections 1024; }

http {
  # Docker's embedded DNS so we can resolve the `gateway` service name.
  resolver 127.0.0.11 valid=5s ipv6=off;

  # --- The edge cache ------------------------------------------------------
  # A shared-memory zone (keys) + on-disk body store. This is the CDN/edge idea
  # in miniature: a cache that sits IN FRONT of the origin and answers repeat
  # requests itself, so the origin only sees the first (a cache MISS).
  #   keys_zone=edge:10m  -> ~80k cached keys tracked in 10MB of memory
  #   max_size=100m       -> cap the on-disk body store
  #   inactive=60s        -> evict entries not requested for 60s
  proxy_cache_path /var/cache/nginx/edge levels=1:2 keys_zone=edge:10m
                   max_size=100m inactive=60s;

  log_format observed '$remote_addr "$request" $status '
                      'cache=$upstream_cache_status rt=$request_time';
  access_log /dev/stdout observed;

  server {
    listen 80;

    # Surface the cache decision so `curl -i` shows HIT / MISS / EXPIRED.
    add_header X-Cache-Status $upstream_cache_status always;

    location / {
      proxy_cache edge;
      # Cache 200/302 responses for 10s; everything else is not cached.
      proxy_cache_valid 200 302 10s;
      # What makes two requests "the same" for cache purposes.
      proxy_cache_key "$scheme$request_method$host$request_uri";
      # Collapse a stampede: if many clients ask for the same missing key at
      # once, only ONE goes to the origin; the rest wait for that fill.
      proxy_cache_lock on;

      set $origin "gateway:80";
      proxy_pass http://$origin;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
  }
}
